services:
  db:
    image: mariadb:11.4
    container_name: nutritrack-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./nutritrack_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./nutritrack-api
    container_name: nutritrack-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${API_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "5000:${API_PORT}"

  frontend:
    build:
      context: ./nutritrack
    container_name: nutritrack-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  mariadb_data:
